    <meta charset="UTF-8" />

    <title>NBA Coordinator - Self Assessment</title>
    <script>
      // Prevent libraries from crashing if they try to overwrite the read-only fetch getter
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { /* ignore */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Fallback if re-definition is not allowed
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
